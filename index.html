<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Music for everyone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="radio.png">
</head>
<body>
    <nav>
        <ul>
            <li class="brand"><img src="radio.png" alt="Radio">Radio</li>
            <li>Home</li>
            <li>About</li>
        </ul>
    </nav>
    <div class="container">
        <div class="songList">
            <h1>Mehfil</h1>

            <div class="songItem">
                <img src="covers/cover1.jpg">
                <span>Meri Zindagi Hai Tu</span>
                <span class="songListPlay">
                    <span class="timestamp">05:34</span>
                    <i class="fa-solid fa-circle-play"></i>
                </span>
            </div>

            <div class="songItem">
                <img src="covers/cover2.jpg">
                <span>Dooron-Dooron</span>
                <span class="songListPlay">
                    <span class="timestamp">05:34</span>
                    <i class="fa-solid fa-circle-play"></i>
                </span>
            </div>

            <div class="songItem">
                <img src="covers/cover3.jpg">
                <span>Ijazat</span>
                <span class="songListPlay">
                    <span class="timestamp">05:34</span>
                    <i class="fa-solid fa-circle-play"></i>
                </span>
            </div>

            <div class="songItem">
                <img src="covers/cover4.jpg">
                <span>Dil Diyan Gallan</span>
                <span class="songListPlay">
                    <span class="timestamp">05:34</span>
                    <i class="fa-solid fa-circle-play"></i>
                </span>
            </div>

            <div class="songItem">
                <img src="covers/cover5.jpg">
                <span>Tera Mera Hai Pyar Amar</span>
                <span class="songListPlay">
                    <span class="timestamp">05:34</span>
                    <i class="fa-solid fa-circle-play"></i>
                </span>
            </div>
             <div class="songItem">
                <img src="covers/cover6.jpg">
                <span>Jaan Nisaar OST</span>
                <span class="songListPlay">
                    <span class="timestamp">05:34</span>
                    <i class="fa-solid fa-circle-play"></i>
                </span>
            </div>
        </div>

        <div class="songBanner"></div>
    </div>

    <div class="bottom">

    <div class="progressContainer">
        <span id="currentTime">0:00</span>
        <input type="range" id="ProgressBar" value="0" min="0" max="100">
        <span id="totalTime">0:00</span>
    </div>

    <div class="controls">

        <div class="songInfo">
            <img src="player.gif" width="40" height="40" id="gif">
            <span id="songInfo">Song Name</span>
        </div>

        <div class="icons">
            <i id="previous" class="fa-solid fa-backward-step"></i>
            <i id="masterPlay" class="fa-solid fa-2x fa-circle-play"></i>
            <i id="next" class="fa-solid fa-forward-step"></i>
        </div>

        <div class="VolumeControl">
            <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5">
        </div>

    </div>

</div>


   
    <script src="https://kit.fontawesome.com/ec53a2156e.js" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
